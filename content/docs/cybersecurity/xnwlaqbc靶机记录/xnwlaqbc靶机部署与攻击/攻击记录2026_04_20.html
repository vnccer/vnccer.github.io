    padding: 0 3px;
    border-radius: .825em;

    content: counter(list-item);
    counter-increment: li;
    font-size: .65em;
    margin-left: -25px;
    margin-top: calc(var(--list-height) / 2 - 3px);
    text-align: center;
    width: auto;
    min-width: 1.65em;
    white-space: nowrap;
    transition: transform 0.5s;
}

    top: calc(var(--list-height) / 2 - 4px);
    position: absolute;
    height: 1.2rem;
    width: 1.2rem;
    margin-left: -1.8em;
}

/* ---- 任务列表复选框动画增强 ---- */
#write input[type=checkbox] {
    appearance: none;
    -webkit-appearance: none;
    border: 2px solid var(--alert-theme-color, var(--theme-color));
    border-radius: 4px;
    display: inline-block;
    vertical-align: middle;
}

/* 勾形 */
#write input[type=checkbox]::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 50%;
    height: 85%;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: translate(-50%, -62%) rotate(45deg);
    opacity: 0;
    box-sizing: border-box;
}

#write input[type=checkbox]:checked {
    background: var(--alert-theme-color, var(--theme-color));
    border-color: var(--alert-theme-color, var(--theme-color));
}

#write input[type=checkbox]:checked::after {
    opacity: 1;
}

li.md-list-item.task-list-item.md-task-list-item::marker {
    content: none;

}

.md-task-list-item span {
    position: relative;
    display: inline-block;
}

/* ---------------->> 删除线 <<---------------- */
.md-task-list-item span::after {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    width: 100%;
    height: 2px;
    background: currentColor;
    transform: scaleX(0) translateY(-50%);
    transform-origin: left center;
    transition: transform .38s ease;
}

/* 完成状态：颜色变淡 + 线条展开 */
.md-task-list-item.task-list-done span {
    color: grey;
}

.md-task-list-item.task-list-done span::after {
    transform: scaleX(1) translateY(-50%);
}

@media (prefers-reduced-motion: reduce) {
    .md-task-list-item span::after {
        transition: none;
    }
}

    /* ---------------->> 悬浮 <<---------------- */
    --item-bg-color-red: rgb(from var(--main-red) r g b / 0.22);
    --item-bg-color-blue: rgb(from var(--theme-color) r g b / 0.26);
    /* ---------------->> 阴影 <<---------------- */
    --box-shadow: 0px 4px 4px rgba(0, 0, 0, .1);
    --box-shadow-large: 0 8px 15px rgba(0, 0, 0, .3);
    --drop-shadow: drop-shadow(3px 3px 2px rgba(0, 0, 0, 0.3));
    --brightness: brightness(1);
    /* ---------------->> 过渡 <<---------------- */
    --transition: box-shadow 0.3s ease, transform 0.3s ease;
    --bg-transition: background-color 0.5s ease;
    /* ---------------->> 左到右透明渐变色 <<---------------- */
    --gradient-color: linear-gradient(to right, var(--theme-light-color), rgba(255, 255, 255, 0));
    /* ---------------->> 圆角 <<---------------- */
    --radius-small: 5px;
    --radius-large: 10px;
    --radius-xlarge: 15px;
    /* ---------------->> 云母 <<---------------- */
    --mica-bg: rgba(255, 255, 255, 0.65);
    --mica-blur: blur(12px) saturate(1.3);
    --mica-border: 1px solid rgba(255, 255, 255, 0.15);
    --mica-shadow: 0 4px 6px -2px rgba(0, 0, 0, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    --mica-transition: background-color 0.5s ease, box-shadow 0.5s ease;
    /* ---------------->> Mermaid 图表，详情见 https://support.typoraio.cn/Diagram-Options/ <<---------------- */
    /* 主题，可切换为 "default" "base" "dark" "forest" "neutral" "night" */
    --mermaid-theme: default;
    /* 字体 */
    --mermaid-font-family: var(--main-font-family), "trebuchet ms", verdana, arial, sans-serif;
    /* 时序图编号 or "off", see https://mermaid-js.github.io/mermaid/#/sequenceDiagram?id=sequencenumbers*/
    --mermaid-sequence-numbers: on;
    /* 线条风格 可切换为 "linear","basis","natural","step" */
    --mermaid-flowchart-curve: linear;
    /* 甘特图左侧边距 */
    --mermaid--gantt-left-padding: 75;
    /* 时序图主题 simple：普通 hand：手绘风格 */
    --sequence-theme: hand;
}

    content: counter(list-item);

    position: absolute;
    height: 1.2rem;
    width: 1.2rem;
    margin-left: -1.8em;
}

/* ---- 任务列表复选框动画增强 ---- */
#write input[type=checkbox] {
    appearance: none;
    -webkit-appearance: none;
    border: 2px solid var(--alert-theme-color, var(--theme-color));
    border-radius: 4px;
    display: inline-block;
    vertical-align: middle;
}

/* 勾形 */
#write input[type=checkbox]::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 50%;
    height: 85%;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: translate(-50%, -62%) rotate(45deg);
    opacity: 0;
    box-sizing: border-box;
}

#write input[type=checkbox]:checked {
    background: var(--alert-theme-color, var(--theme-color));
    border-color: var(--alert-theme-color, var(--theme-color));
}

#write input[type=checkbox]:checked::after {
    opacity: 1;
}

    content: none;
    font-size: inherit;
}

.md-task-list-item span {
    position: relative;
    display: inline-block;
}

/* ---------------->> 删除线 <<---------------- */
.md-task-list-item span::after {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    width: 100%;
    height: 2px;
    background: currentColor;
    transform: scaleX(0) translateY(-50%);
    transform-origin: left center;
    transition: transform .38s ease;
}

/* 完成状态：颜色变淡 + 线条展开 */
.md-task-list-item.task-list-done span {
    color: grey;
}

.md-task-list-item.task-list-done span::after {
    transform: scaleX(1) translateY(-50%);
}

@media (prefers-reduced-motion: reduce) {
    .md-task-list-item span::after {
        transition: none;
    }
}
