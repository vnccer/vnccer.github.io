# ==========================================================================
# 4. 主题外观参数 (Theme Parameters)
# ==========================================================================
[params]
  # 资源文件 (须放在 static/ 目录下)
  BookLogo = 'flamez.png' 
  BookFavicon = 'AK47.png'

  # 外观风格
  BookTheme = 'dark'     # 强制开启深色模式以适配你的 SCSS
  BookSection = 'docs'   # 默认文档根目录
  BookSearch = true      # 开启全文搜索
  BookToC = true        # 建议关闭默认目录，防止与页面内容重叠

  # 仓库信息与编辑链接
  BookRepo = 'https://github.com/alex-shpak/hugo-book/'
  BookLastChangeLink = '{{ .Site.Params.BookRepo }}/commit/{{ .GitInfo.Hash }}'
  BookEditLink = '{{ .Site.Params.BookRepo }}/edit/main/exampleSite/{{ .Path }}'
  BookDateFormat = 'January 2, 2006'

  # 功能开关
  BookComments = true           # 开启评论模板
  BookPortableLinks = 'warning' # 开启便携链接检查
  BookServiceWorker = 'precache' # 开启离线缓存 (PWA)
  BookTranslatedOnly = false    # 仅显示已翻译页面
  
  # copyright
  copyright_html = '<a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" class="license-link">CC BY 4.0</a>'

