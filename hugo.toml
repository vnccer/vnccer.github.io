# ==========================================================================
# 1. 基础全局设置 (Global Settings)
# ==========================================================================
baseURL = 'https://vnccer.github.io/'
title = 'vnccer'
theme = 'hugo-book'

# 核心构建行为
disablePathToLower = true # 禁用路径自动转小写
enableGitInfo = true      # 开启 Git 信息获取 (用于显示最后修改时间)

# ==========================================================================
# 2. 渲染引擎配置 (Markup & Highlight)
# ==========================================================================
[markup]
  # 内容渲染引擎设置
  [markup.goldmark.renderer]
    unsafe = true # 允许在 Markdown 中直接使用 HTML (用于你的自定义封面)

  # 页面内目录 (Table of Contents) 设置
  [markup.tableOfContents]
    startLevel = 1

  # 代码高亮设置 - 完美适配 GitHub Dark 色系
  [markup.highlight]
    style = 'github-dark'      # 使用 GitHub Dark 官方配色
    lineNos = true             # 显示行号
    lineNumbersInTable = false # 优化行号显示，方便复制
    noClasses = true           # 使用内联样式，保证稳定性
    guessSyntax = true         # 自动识别未指定语言的代码块

# ==========================================================================
# 3. 语言与菜单配置 (Languages & Menus)
# ==========================================================================
[languages.zh]
  languageName = 'Chinese'
  contentDir = 'content'
  weight = 1

[menu]
  # 顶部/主导航菜单
  [[menu.home]]
    name = '跳转链接'
    pageRef = '/showcases/'
    weight = 1

#    暂时关闭，冗余
