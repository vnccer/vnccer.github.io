name: deploy

on:
  push:
    branches:
      - main  # 如果你的分支名是 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 这一行非常关键，用于加载你的 hugo-book 主题
          fetch-depth: 0         # 配合你开启的 GitInfo 功能读取提交记录

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true         # 因为你安装的是 Extended 版本

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public