<div id="cheat-video-modal">
  <div class="close-video" title="关闭">×</div>
  <video id="cheat-video-player" controls preload="auto" playsinline>
    <source src="{{ "video/cheat.mp4" | relURL }}" type="video/mp4">
    您的浏览器不支持视频标签。
  </video>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const videoModal = document.getElementById('cheat-video-modal');
  const videoPlayer = document.getElementById('cheat-video-player');
  const closeBtn = document.querySelector('.close-video');

  const navLinks = document.querySelectorAll('a[href="#cheat"]');
  navLinks.forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault(); 
      videoModal.classList.add('active'); 
      
      // === 核心修改：设置 50% 音量 ===
      videoPlayer.volume = 0.5; // 音量范围是 0.0 到 1.0
      
      videoPlayer.load(); 
      let playPromise = videoPlayer.play();
      
      if (playPromise !== undefined) {
        playPromise.then(_ => {
          console.log("🚀 彩蛋视频带声音播放成功！");
        }).catch(error => {
          console.error("❌ 浏览器策略拦截:", error);
        });
      }
    });
  });

  const closeModal = () => {
    videoModal.classList.remove('active');
    videoPlayer.pause(); 
    videoPlayer.currentTime = 0; 
  };

  if (closeBtn) closeBtn.addEventListener('click', closeModal);
  
  if (videoModal) {
    videoModal.addEventListener('click', function(e) {
      if(e.target === videoModal) {
        closeModal();
      }
    });
  }
});
</script>
