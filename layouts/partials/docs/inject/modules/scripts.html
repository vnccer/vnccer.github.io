<script>
// 侧边栏折叠核心逻辑 (带持久化)
function toggleSidebar() {
  const container = document.querySelector('main.container');
  container.classList.toggle('sidebar-collapsed');
  const isCollapsed = container.classList.contains('sidebar-collapsed');
  localStorage.setItem('sidebar-collapsed', isCollapsed);
}

// 关键优化：页面初始加载时，立即移除初始化占位类
document.addEventListener("DOMContentLoaded", () => {
  const container = document.querySelector('main.container');
  const html = document.documentElement;

  // 1. 初始化侧边栏状态
  if (localStorage.getItem('sidebar-collapsed') === 'true') {
    container.classList.add('sidebar-collapsed');
  }
  
  // 移除防止闪烁的初始化类
  setTimeout(() => {
    html.classList.remove('sidebar-collapsed-init');
  }, 10);

  // 2. TOC 锚点追踪逻辑
  const tocLinks = document.querySelectorAll('.book-toc #TableOfContents a');
  const headings = document.querySelectorAll('main article.markdown h1[id], main article.markdown h2[id], main article.markdown h3[id], main article.markdown h4[id]');
  
  if (tocLinks.length === 0 || headings.length === 0) return;

  let isJumping = false; 
  let jumpTimeout;

  const initTocClicks = () => {
    tocLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        isJumping = true; 
        clearTimeout(jumpTimeout);
        tocLinks.forEach(l => l.classList.remove('active'));
        this.classList.add('active');
        jumpTimeout = setTimeout(() => { isJumping = false; }, 800); 
      });
    });
  };

  const initScrollObserver = () => {
    const observer = new IntersectionObserver(entries => {
      if (isJumping) return; 
      const activeEntries = entries.filter(entry => entry.isIntersecting);
      if (activeEntries.length > 0) {
        const currentEntry = activeEntries[activeEntries.length - 1];
        const id = currentEntry.target.getAttribute('id');
        const targetLink = document.querySelector(`.book-toc #TableOfContents a[href="#${id}"]`);
        if (targetLink) {
          tocLinks.forEach(l => l.classList.remove('active'));
          targetLink.classList.add('active');
        }
      }
    }, { 
      root: null, 
      rootMargin: '-5% 0px -80% 0px', 
      threshold: 0
    });
    headings.forEach(heading => observer.observe(heading));
  };

  initTocClicks();
  initScrollObserver();
});
</script>
